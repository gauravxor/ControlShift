version: '3.8'

services:
  auth-postgres:
    image: postgres:17.5
    container_name: auth-postgres
    environment:
      POSTGRES_DB: ${AUTH_DB}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "${AUTH_DB_PORT}:5432"
    volumes:
      - authdata:/var/lib/postgresql/data

  player-postgres:
    image: postgres:17.5
    container_name: player-postgres
    environment:
      POSTGRES_DB: ${PLAYER_DB}
      POSTGRES_USER: ${PLAYER_DB_USER}
      POSTGRES_PASSWORD: ${PLAYER_DB_PASSWORD}
    ports:
      - "${PLAYER_DB_PORT}:5432"
    volumes:
      - playerdata:/var/lib/postgresql/data

volumes:
  authdata:
  playerdata: